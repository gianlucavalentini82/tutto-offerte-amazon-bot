<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tutto Offerte Manager</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container py-5">

    <div class="text-center mb-5">
        <h1>🚀 Tutto Offerte Manager</h1>
        <p class="text-muted">
            Gestione offerte Amazon e pubblicazione Telegram
        </p>
    </div>

    <div class="row g-4">

        <div class="col-md-4">
            <div class="card shadow-sm h-100">
                <div class="card-body text-center">
                    <h2>➕</h2>
                    <h5>Nuova Offerta</h5>
                    <p>Crea una nuova offerta Amazon.</p>

                    <button class="btn btn-primary w-100" disabled>
                        Prossimamente
                    </button>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow-sm h-100">
                <div class="card-body text-center">
                    <h2>📦</h2>
                    <h5>Archivio Offerte</h5>
                    <p>Visualizza tutte le offerte salvate.</p>

                    <button class="btn btn-secondary w-100" disabled>
                        Prossimamente
                    </button>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow-sm h-100">
                <div class="card-body text-center">
                    <h2>⚙️</h2>
                    <h5>Impostazioni</h5>
                    <p>Configura Telegram e il gestionale.</p>

                    <button class="btn btn-dark w-100" disabled>
                        Prossimamente
                    </button>
                </div>
            </div>
        </div>

    </div>

</div>

</body>
</html>
