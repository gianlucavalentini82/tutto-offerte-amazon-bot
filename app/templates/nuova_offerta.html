<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Nuova Offerta</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>


<body class="bg-light">


<div class="container py-5">


    <div class="mb-4">
        <a href="/" class="btn btn-secondary">
            ← Torna alla Dashboard
        </a>
    </div>


    <div class="card shadow-sm">

        <div class="card-body">


            <h1 class="mb-4">
                ➕ Nuova Offerta
            </h1>


            <form method="post" action="/pubblica-offerta">


                <div class="mb-3">

                    <label class="form-label">
                        Nome prodotto
                    </label>

                    <input 
                        type="text" 
                        name="prodotto"
                        class="form-control"
                        placeholder="Es. Trapano Parkside"
                        required>

                </div>



                <div class="row">


                    <div class="col-md-6 mb-3">

                        <label class="form-label">
                            Prezzo precedente
                        </label>

                        <input 
                            type="text"
                            name="prezzo_vecchio"
                            class="form-control"
                            placeholder="99,99 €"
                            required>

                    </div>



                    <div class="col-md-6 mb-3">

                        <label class="form-label">
                            Prezzo offerta
                        </label>

                        <input 
                            type="text"
                            name="prezzo_offerta"
                            class="form-control"
                            placeholder="69,99 €"
                            required>

                    </div>


                </div>




                <div class="mb-3">

                    <label class="form-label">
                        Link Amazon
                    </label>

                    <input 
                        type="url"
                        name="link_amazon"
                        class="form-control"
                        placeholder="https://amazon.it/..."
                        required>

                </div>




                <div class="mb-3">

                    <label class="form-label">
                        Link recensione YouTube (opzionale)
                    </label>

                    <input 
                        type="url"
                        name="link_youtube"
                        class="form-control"
                        placeholder="https://youtube.com/...">

                </div>




                <div class="form-check mb-4">

                    <input 
                        class="form-check-input"
                        type="checkbox"
                        name="consigliato">


                    <label class="form-check-label">

                        ⭐ Prodotto consigliato da Gianluca

                    </label>

                </div>




                <button 
                    type="submit"
                    class="btn btn-success w-100">

                    📲 Pubblica Offerta su Telegram

                </button>



            </form>


        </div>

    </div>


</div>


</body>

</html>
